<!--layout 
Before HTML5, people used lots of <div> tags.
HTML5 introduced semantic layout tags that describe the purpose of each section.

Usually contains:

Logo
Website name
Main heading
-->

<!DOCTYPE html>

<html>

    <head>
        
    </head>

    <body>
        <!--header -->
        <!--
        Usually contains:
        
        Logo
        Website name
        Main heading
        -->
        <header>
            <h1>My Website</h1>
        </header>

        <!--Navigation menu. -->
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

        <!--section -->
        <!--Groups related content. -->
        <section>
            <h2>About Me</h2>
            <p>I am a student.</p>
        </section>

        <!--article -->
        <!--Independent content. -->
        <!--
        Blog post
        News article
        Forum post
        -->
        <article>
            <h2>HTML Basics</h2>
            <p>Learning HTML is fun.</p>
        </article>

        <!--footer : Bottom part of page. -->
        <footer>
            @ Copyright 2026
        </footer>
        
    </body>
    
</html>

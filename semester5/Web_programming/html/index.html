<!DOCTYPE html>   <!-- tells browser it is an html document-->

<!--starting of the html document -->
<html>    

<!-- contains information about the webpage. user don't see what is inside the head -->
<head>
    <title>hello Anik</title>  <!--will be shown on the tab -->
</head>

<!-- everyting visible on webpage goes inside this -->
<body>

    <!--heading tags -->
    <h1>hello anik</h1>
    <h2>hello anik</h2>
    <h3>hello anik</h3>
    <h4>hello anik</h4>
    <h5>hello anik</h5>
    <h6>hello anik</h6>

    <!-- anchor tag- link tag -->
    <a>hello</a>

    <!--paragraph tag -->
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. 
        Modi nam <em>officia</em> nobis <u>magnam</u> recusandae <strong>deleniti</strong> sapiente 
        sunt nulla soluta, repellat ut, quaerat quod perferendis <br> illum expedita alias debitis, eos ad!
    </p>
    <!--
        <em></em> => Emphasized text
        <u></u> => underline
        <strong></strong> => bold
        <i></i> => italic
        <br> => line break
        <hr> => horizontal line
    -->

    <!--attributes : attributes provide extra information about an element -->
    <!-- Element : an element is everything from the opening to closing tag -->
    <!-- <tag attribute="value"> -->
    <a href="https://ragbucket.vercel.app">RagBucket</a>

    <!--common attributes : id, class, title, href -->

    
    
</body>

</html>
<!--ending of the html document -->

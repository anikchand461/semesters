<!DOCTYPE html>
<html>
<head>
    <title>HTML Iframe Examples</title>
</head>
<body>

    <h1>HTML Iframe Examples</h1>

    <hr>

    <h2>1. Local HTML File in Iframe</h2>

    <iframe
        src="page2.html"
        width="500"
        height="500">
    </iframe>

    <hr>

    <h2>2. Iframe with Border</h2>

    <iframe
        src="page2.html"
        width="500"
        height="200"
        style="border:3px solid red;">
    </iframe>

    <hr>

    <h2>3. Open Links Inside Iframe</h2>

    <iframe
        name="myframe"
        width="500"
        height="250">
    </iframe>

    <br><br>

    <a href="page2.html" target="myframe">
        Open Page2 Inside Iframe
    </a>

    <hr>

    <h2>4. Google Maps Iframe</h2>

    <iframe
        src="https://maps.google.com/maps?q=kolkata&t=&z=10&ie=UTF8&iwloc=&output=embed"
        width="600"
        height="300">
    </iframe>

</body>
</html>

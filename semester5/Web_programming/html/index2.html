<!DOCTYPE html>

<html>
    <head>
        
    </head>
    <body>
        <h1>hello</h1>

        <ol type="A">   <!-- type="A" -> A, B, C | type="1" -> 1, 2, 3 -->
            <li>one</li>
            <li>two</li>
            <li>three</li>
        </ol>

        <ol type="1">   <!-- default-->
            <li>one</li>
            <li>two</li>
            <li>three</li>
        </ol>

        <ol type="I">
            <li>one</li>
            <li>two</li>
            <li>three</li>
        </ol>

        <ul>
            <li>one</li>
            <li>two</li>
            <li>three</li>
        </ul>

        <!--
        <ol></ol> => ordered list
        <ul></ul> => unordered list
        <li></li> => list item
        -->

        <!--nested list -->
        <ul>
            <li>Programming
                <ul>
                    <li>Python</li>
                    <li>Java</li>
                </ul>
            </li>
        </ul>


        <!--table -->

        <table border="1">   <!-- table with border -->
            <tr>  <!--table row -->
                <th>Name</th>  <!--table heading -->
                <th>Age</th>
            </tr>
        
            <tr>
                <td>Anik</td> <!--table data -->
                <td>20</td>
            </tr>
        </table>
        
    </body>
</html>

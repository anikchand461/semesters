<!DOCTYPE html>
<html>
<head>
    <title>CSS Images Demo</title>

    <link rel="stylesheet" href="styles6.css">
</head>
<body>

    <h1>CSS Images Demo</h1>

    <!-- Normal Image -->
    <h2>Normal Image</h2>

    <img
        class="normal-image"
        src="https://picsum.photos/400"
        alt="Normal Image">

    <hr>

    <!-- Rounded Image -->
    <h2>Rounded Image</h2>

    <img
        class="rounded-image"
        src="https://picsum.photos/401"
        alt="Rounded Image">

    <hr>

    <!-- Circular Profile Image -->
    <h2>Profile Image</h2>

    <img
        class="profile-image"
        src="https://picsum.photos/402"
        alt="Profile Image">

</body>
</html>

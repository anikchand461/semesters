<!DOCTYPE html>
<html>
<head>
    <title>CSS Alerts</title>

    <style>

        /*

        Alert

        Used to display messages.

        Types:
        - Success
        - Error
        - Warning
        - Info

        Common Properties:
        - background-color
        - color
        - border
        - padding
        - margin

        */

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 15px;
            margin: 10px;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 15px;
            margin: 10px;
        }

        .warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 15px;
            margin: 10px;
        }

        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            padding: 15px;
            margin: 10px;
        }

    </style>

</head>
<body>

    <h1>CSS Alerts Demo</h1>

    <div class="success">
        ✅ Success! Data saved successfully.
    </div>

    <div class="error">
        ❌ Error! Invalid password.
    </div>

    <div class="warning">
        ⚠️ Warning! Low battery.
    </div>

    <div class="info">
        ℹ️ Info! New update available.
    </div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<style>

/*

Quotes

Used to display quotations.

Common Properties:

border-left
padding
margin
font-style
background-color

*/

blockquote {

    border-left: 5px solid gray;

    background-color: #f5f5f5;

    padding: 15px;

    margin: 20px;

    font-style: italic;
}

</style>

</head>
<body>

<blockquote>

    Success is the sum of small efforts repeated day in and day out.

</blockquote>

</body>
</html>

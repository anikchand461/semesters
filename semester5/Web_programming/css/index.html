<!--

Padding = space inside the border
Margin = space outside the border

Box Model

+-------------------------+
|         Margin          |
|  +-------------------+  |
|  |      Border       |  |
|  | +---------------+ |  |
|  | |    Padding    | |  |
|  | |  +---------+  | |  |
|  | |  | Content |  | |  |
|  | |  +---------+  | |  |
|  | +---------------+ |  |
|  +-------------------+  |
+-------------------------+

-->

<!DOCTYPE html>
<html>
<head>

<style>

h1 {
    color: blue;
    border: 2px solid blue;
    padding: 20px;
    margin: 30px;
}

p {
    color: green;
    border: 1px dashed red;
    padding: 10px 20px 30px 40px;
    margin: 20px;
}

</style>

<!--

margin: 10px 20px 30px 40px;

Top    = 10px
Right  = 20px
Bottom = 30px
Left   = 40px

-->

<!--

Individual Margins

margin-top: 10px;
margin-right: 20px;
margin-bottom: 30px;
margin-left: 40px;

-->

</head>
<body>

<h1>Hello Anik</h1>

<p>Learning CSS</p>

</body>
</html>

<!--

Difference Between Padding and Margin

Padding:
- Space inside the border
- Background color affects it

Margin:
- Space outside the border
- Background color does NOT affect it

-->

<!--

Common Usage

margin-bottom: 20px;

Used to create space between sections.

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Demo</title>

    <link rel="stylesheet" href="styles2.css">
</head>
<body>

    <h1>CSS Display Property</h1>

    <hr>

    <h2>1. display: block</h2>

    <span class="block-demo">Block 1</span>
    <span class="block-demo">Block 2</span>

    <hr>

    <h2>2. display: inline</h2>

    <div class="inline-demo">Inline 1</div>
    <div class="inline-demo">Inline 2</div>

    <br>
    <br>
    <hr>

    <h2>3. display: inline-block</h2>

    <div class="inline-block-demo">Box 1</div>
    <div class="inline-block-demo">Box 2</div>
    <div class="inline-block-demo">Box 3</div>

    <hr>

    <h2>4. display: none</h2>

    <p>This paragraph is visible.</p>

    <p class="hidden-text">
        You should NOT see this text.
    </p>

</body>
</html>

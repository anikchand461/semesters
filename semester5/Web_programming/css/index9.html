<!DOCTYPE html>
<html>
<head>

<style>

/*

Tags

Used for:
- Categories
- Labels
- Skills
- Technologies

Common Properties:

display
padding
background-color
border-radius

*/

.tag {

    display: inline-block;

    background-color: #007bff;

    color: white;

    padding: 5px 10px;

    border-radius: 15px;

    margin: 5px;
}

</style>

</head>
<body>

<span class="tag">HTML</span>

<span class="tag">CSS</span>

<span class="tag">JavaScript</span>

<span class="tag">Python</span>

</body>
</html>

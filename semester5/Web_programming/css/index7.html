<!DOCTYPE html>
<html>
<head>

<style>

/*

Note

Used to highlight important information.

Common Properties:

border-left
padding
margin
background-color

*/

.note {

    border-left: 5px solid blue;

    background-color: #e7f3fe;

    padding: 15px;

    margin: 20px;

}

</style>

</head>
<body>

<div class="note">

    <strong>Note:</strong>

    Always save your HTML and CSS files before refreshing the browser.

</div>

</body>
</html>
